version: "3.9"

# ──────────────────────────────────────────────────────────────────
#  Omni Voice Platform — Docker Compose
#  One command to spin up the full platform + observability stack.
#
#  Usage:
#    cp .env.example .env        # fill in API keys
#    docker compose up -d        # start everything
#    open http://localhost:8000/docs    # API docs
#    open http://localhost:3000         # Grafana dashboard
#    open demo/index.html               # browser voice demo
# ──────────────────────────────────────────────────────────────────

services:

  # ── Platform Server ─────────────────────────────────────────────
  omni-voice:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: omni_voice_server
    ports:
      - "8000:8000"     # FastAPI / WebSocket
      - "9090:9090"     # Prometheus metrics
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [omni]

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: omni_prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks: [omni]

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: omni_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=omnivoice
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    restart: unless-stopped
    networks: [omni]

  # ── Loki (log aggregation) ───────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: omni_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped
    networks: [omni]

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  omni:
    driver: bridge
