<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Voice — Live Demo</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --border: #2e2e3e;
      --accent: #7c6ff7;
      --accent-dim: #4a45a0;
      --green: #34d399;
      --red: #f87171;
      --text: #e2e2f0;
      --muted: #8888aa;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 680px;
      margin-bottom: 1rem;
    }
    .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 1rem; }

    /* Connection */
    .row { display: flex; gap: 0.75rem; align-items: center; }
    input[type=text] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      outline: none;
    }
    input[type=text]:focus { border-color: var(--accent); }

    button {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-success { background: var(--green); color: #000; }

    /* Status */
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.error { background: var(--red); }
    .status-label { font-size: 0.85rem; color: var(--muted); }

    /* Mic button */
    .mic-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    #mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      font-size: 2rem;
    }
    #mic-btn.recording {
      background: var(--red);
      box-shadow: 0 0 0 0 rgba(248,113,113,0.6);
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(248,113,113,0.6); }
      70% { box-shadow: 0 0 0 16px rgba(248,113,113,0); }
      100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
    }
    .mic-hint { color: var(--muted); font-size: 0.8rem; }

    /* Transcript & conversation */
    #transcript-box {
      background: var(--bg);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      min-height: 2.5rem;
      font-size: 0.9rem;
      color: var(--accent);
      font-style: italic;
    }
    #conversation {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
    }
    .turn {
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.5;
      max-width: 88%;
    }
    .turn.user {
      background: var(--accent-dim);
      color: #fff;
      align-self: flex-end;
    }
    .turn.assistant {
      background: var(--border);
      color: var(--text);
      align-self: flex-start;
    }

    /* Metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    .metric {
      background: var(--bg);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .metric-label { font-size: 0.75rem; color: var(--muted); }
    .metric-value { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .metric-value.good { color: var(--green); }
    .metric-value.warn { color: #fbbf24; }
    .metric-value.bad { color: var(--red); }

    /* Log */
    #log {
      font-family: 'Fira Code', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>🎙 Omni Voice</h1>
<p class="subtitle">Real-Time Voice AI Platform — Live Demo</p>

<!-- Connection -->
<div class="card">
  <h2>Connection</h2>
  <div class="row">
    <input type="text" id="ws-url" value="ws://localhost:8000/ws/voice" />
    <button class="btn-primary" id="connect-btn" onclick="connect()">Connect</button>
    <button class="btn-success" id="demo-btn" onclick="startDemoMode()" style="white-space:nowrap">▶ Demo Mode</button>
  </div>
  <div class="row" style="margin-top:0.75rem">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">Disconnected — click <strong>Demo Mode</strong> to try without a server</span>
  </div>
</div>

<!-- Mic -->
<div class="card">
  <h2>Voice Input</h2>
  <div class="mic-wrap">
    <button id="mic-btn" onclick="toggleMic()" disabled>🎤</button>
    <span class="mic-hint" id="mic-hint">Connect first, then hold to speak</span>
  </div>
  <div style="margin-top:1rem">
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.4rem">Live transcript</div>
    <div id="transcript-box">…</div>
  </div>
</div>

<!-- Conversation -->
<div class="card">
  <h2>Conversation</h2>
  <div id="conversation"></div>
</div>

<!-- Metrics -->
<div class="card">
  <h2>Performance</h2>
  <div class="metrics-grid">
    <div class="metric">
      <div class="metric-label">Frames sent</div>
      <div class="metric-value" id="m-frames">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Audio received</div>
      <div class="metric-value" id="m-audio">0 KB</div>
    </div>
    <div class="metric">
      <div class="metric-label">Transcripts</div>
      <div class="metric-value" id="m-transcripts">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">RTT</div>
      <div class="metric-value" id="m-rtt">—</div>
    </div>
  </div>
</div>

<!-- Log -->
<div class="card">
  <h2>Log</h2>
  <div id="log"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ws = null;
let sessionId = null;
let mediaStream = null;
let audioContext = null;
let scriptProcessor = null;
let isRecording = false;
let audioCtxForPlayback = null;
let demoMode = false;
let demoTurnIdx = 0;
let demoPipelineRunning = false;

const stats = { frames: 0, audioBytes: 0, transcripts: 0 };
let lastPingTs = null;
let rttMs = null;

// ── Demo Mode conversations ─────────────────────────────────────────────────
const DEMO_CONVERSATIONS = [
  {
    user: "Hello, I'd like to test the voice pipeline.",
    assistant: "Hello! I'm the Omni Voice assistant. The pipeline is fully operational — ASR, LLM, and TTS are all connected and running in real time.",
    latency: { asr: 87, llm: 142, tts: 63, total: 292 },
    freq: [220, 330, 440]
  },
  {
    user: "What's the target end-to-end latency?",
    assistant: "The target is under 300 milliseconds. That covers ASR transcription at around 80ms, LLM first-token at 140ms, and TTS synthesis at 60ms — leaving margin for network jitter.",
    latency: { asr: 79, llm: 138, tts: 58, total: 275 },
    freq: [196, 294, 392]
  },
  {
    user: "How does barge-in interruption work?",
    assistant: "Barge-in uses the ATTS scheduler. When the VAD detects your voice mid-response, it cancels the active TTS task immediately and transitions back to the Listening state within one frame — about 20 milliseconds.",
    latency: { asr: 93, llm: 155, tts: 71, total: 319 },
    freq: [261, 392, 523]
  },
  {
    user: "Tell me about the Temporal Alignment Buffer.",
    assistant: "The TAB smooths bursty LLM token streams into a steady phoneme flow for TTS. It uses a leaky-bucket rate shaper with a monotonic timestamp cursor, so synthesis timestamps are always strictly increasing even during burst arrivals.",
    latency: { asr: 82, llm: 149, tts: 67, total: 298 },
    freq: [174, 261, 349]
  },
];

// ── Logging ────────────────────────────────────────────────────────────────
function log(msg) {
  const el = document.getElementById('log');
  const ts = new Date().toISOString().slice(11,23);
  el.textContent += `[${ts}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
}

// ── Connection ─────────────────────────────────────────────────────────────
function connect() {
  const url = document.getElementById('ws-url').value.trim();
  if (ws) { ws.close(); ws = null; }
  if (demoMode) stopDemoMode();

  log(`Connecting to ${url}…`);
  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('connected', 'Connected to ' + url);
    document.getElementById('connect-btn').textContent = 'Disconnect';
    document.getElementById('connect-btn').onclick = disconnect;
    log('WebSocket open');
    startSession();
  };

  ws.onmessage = (evt) => {
    if (evt.data instanceof Blob) {
      evt.data.arrayBuffer().then(playAudio);
      stats.audioBytes += evt.data.size;
      updateMetrics();
    } else {
      handleControl(JSON.parse(evt.data));
    }
  };

  ws.onerror = () => {
    setStatus('error', 'Connection error — try Demo Mode below');
    log('WebSocket error');
  };

  ws.onclose = () => {
    setStatus('', 'Disconnected');
    document.getElementById('connect-btn').textContent = 'Connect';
    document.getElementById('connect-btn').onclick = connect;
    document.getElementById('mic-btn').disabled = true;
    document.getElementById('mic-hint').textContent = 'Connect first, then click to speak';
    log('WebSocket closed');
    stopMic();
  };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
}

// ── Demo Mode ──────────────────────────────────────────────────────────────
function startDemoMode() {
  if (ws) { ws.close(); ws = null; }
  demoMode = true;
  demoTurnIdx = 0;
  demoPipelineRunning = false;

  document.getElementById('demo-btn').textContent = '■ Exit Demo';
  document.getElementById('demo-btn').onclick = stopDemoMode;
  document.getElementById('demo-btn').style.background = 'var(--red)';
  setStatus('connected', '🎭 Demo Mode — no server needed');
  log('Demo mode started — click 🎤 to simulate a turn');

  sessionId = 'demo-' + Math.random().toString(36).slice(2, 8);
  document.getElementById('mic-btn').disabled = false;
  document.getElementById('mic-hint').textContent = 'Click 🎤 to simulate speaking';

  // Fake ping loop showing good latency
  setInterval(() => {
    if (!demoMode) return;
    rttMs = 8 + Math.floor(Math.random() * 6);
    updateMetrics();
  }, 3000);
}

function stopDemoMode() {
  demoMode = false;
  document.getElementById('demo-btn').textContent = '▶ Demo Mode';
  document.getElementById('demo-btn').onclick = startDemoMode;
  document.getElementById('demo-btn').style.background = '';
  setStatus('', 'Disconnected');
  document.getElementById('mic-btn').disabled = true;
  document.getElementById('mic-hint').textContent = 'Connect first, then click to speak';
  log('Demo mode stopped');
}

async function runDemoPipeline() {
  if (demoPipelineRunning) return;
  demoPipelineRunning = true;

  const turn = DEMO_CONVERSATIONS[demoTurnIdx % DEMO_CONVERSATIONS.length];
  demoTurnIdx++;

  // ── Simulate recording animation (1.5 s) ──
  const btn = document.getElementById('mic-btn');
  btn.classList.add('recording');
  btn.textContent = '⏹';
  document.getElementById('mic-hint').textContent = 'Listening… (simulated)';
  log('Mic open — capturing audio');

  // Increment fake frames
  const frameInterval = setInterval(() => {
    stats.frames += 16;
    updateMetrics();
  }, 100);

  await sleep(1500);
  clearInterval(frameInterval);

  btn.classList.remove('recording');
  btn.textContent = '🎤';
  document.getElementById('mic-hint').textContent = 'Processing…';
  log(`Audio burst: ${stats.frames} frames sent`);

  // ── ASR phase ──
  log(`ASR decoding… (${turn.latency.asr} ms)`);
  await sleep(turn.latency.asr);

  document.getElementById('transcript-box').textContent = turn.user;
  stats.transcripts++;
  updateMetrics();
  addTurn('user', turn.user);
  log(`Transcript: "${turn.user.slice(0, 40)}…"`);

  // ── LLM phase ──
  log(`LLM generating… (first token: ${turn.latency.llm} ms)`);
  await sleep(turn.latency.llm);

  // ── TTS phase — stream words into assistant bubble ──
  log(`TTS streaming… (${turn.latency.tts} ms synthesis start)`);
  await sleep(turn.latency.tts);

  const words = turn.assistant.split(' ');
  const assistantEl = document.createElement('div');
  assistantEl.className = 'turn assistant';
  assistantEl.textContent = '';
  document.getElementById('conversation').appendChild(assistantEl);

  for (let i = 0; i < words.length; i++) {
    assistantEl.textContent += (i === 0 ? '' : ' ') + words[i];
    document.getElementById('conversation').scrollTop = 9999;
    stats.audioBytes += 320;
    updateMetrics();
    await sleep(55 + Math.random() * 30);
  }

  // ── Play synthesised audio ──
  log(`Playing TTS audio (${turn.freq.join('+')} Hz chord)`);
  await playDemoAudio(turn.freq, words.length * 0.38);

  // ── Latency summary ──
  const total = turn.latency.total + Math.floor(Math.random() * 15 - 7);
  log(`✓ Turn complete — ASR:${turn.latency.asr}ms LLM:${turn.latency.llm}ms TTS:${turn.latency.tts}ms TOTAL:${total}ms`);

  document.getElementById('mic-hint').textContent = 'Click 🎤 to continue the conversation';
  demoPipelineRunning = false;
}

// ── Synthesised audio using Web Audio oscillators ──────────────────────────
async function playDemoAudio(freqs, duration) {
  const ctx = new AudioContext();
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.18, ctx.currentTime);
  // Fade out last 200 ms
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration - 0.05);
  gain.connect(ctx.destination);

  freqs.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    osc.type = i === 0 ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    // Slight pitch drift to simulate speech formants
    osc.frequency.linearRampToValueAtTime(freq * 1.04, ctx.currentTime + duration * 0.4);
    osc.frequency.linearRampToValueAtTime(freq * 0.97, ctx.currentTime + duration);
    osc.connect(gain);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  });

  await sleep(duration * 1000 + 100);
  ctx.close();
}

// ── Session (real WS) ───────────────────────────────────────────────────────
function startSession() {
  send({ type: 'start_session' });
}

function handleControl(msg) {
  switch (msg.type) {
    case 'session_started':
      sessionId = msg.session_id;
      log(`Session: ${sessionId}`);
      document.getElementById('mic-btn').disabled = false;
      document.getElementById('mic-hint').textContent = 'Click to start talking';
      startPing();
      break;
    case 'transcript':
      document.getElementById('transcript-box').textContent = msg.text;
      stats.transcripts++;
      updateMetrics();
      addTurn('user', msg.text);
      break;
    case 'assistant_turn_complete':
      addTurn('assistant', msg.text);
      break;
    case 'session_ended':
      log('Session ended');
      sessionId = null;
      break;
    case 'error':
      log(`Error: ${msg.message}`);
      break;
    case 'pong':
      if (lastPingTs !== null) {
        rttMs = Date.now() - lastPingTs;
        lastPingTs = null;
        updateMetrics();
        send({ type: 'network_metrics', rtt_ms: rttMs, loss_pct: 0, bw_kbps: 1000 });
      }
      break;
  }
}

// ── Microphone ─────────────────────────────────────────────────────────────
async function toggleMic() {
  if (demoMode) {
    if (!demoPipelineRunning) runDemoPipeline();
    return;
  }
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (isRecording) stopMic(); else await startMic();
}

async function startMic() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: {
      sampleRate: 16000, channelCount: 1,
      echoCancellation: true, noiseSuppression: true,
    }});
    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(mediaStream);
    scriptProcessor = audioContext.createScriptProcessor(320, 1, 1);
    scriptProcessor.onaudioprocess = (e) => {
      if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
      const f32 = e.inputBuffer.getChannelData(0);
      const i16 = new Int16Array(f32.length);
      for (let i = 0; i < f32.length; i++)
        i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32767));
      ws.send(i16.buffer);
      stats.frames++;
      updateMetrics();
    };
    source.connect(scriptProcessor);
    scriptProcessor.connect(audioContext.destination);
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('mic-hint').textContent = 'Recording… click to stop';
    log('Mic started');
  } catch (err) {
    log(`Mic error: ${err.message}`);
  }
}

function stopMic() {
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').textContent = '🎤';
  document.getElementById('mic-hint').textContent = 'Click to start talking';
}

// ── Real audio playback (WS mode) ─────────────────────────────────────────
async function playAudio(buffer) {
  if (!audioCtxForPlayback) audioCtxForPlayback = new AudioContext();
  try {
    const decoded = await audioCtxForPlayback.decodeAudioData(buffer);
    const source = audioCtxForPlayback.createBufferSource();
    source.buffer = decoded;
    source.connect(audioCtxForPlayback.destination);
    source.start();
    addTurn('assistant', '[🔊 Audio response]');
    log(`Playing ${(buffer.byteLength / 1024).toFixed(1)} KB audio`);
  } catch (e) {
    // Mock server sends PCM-16 — play raw
    try {
      const ctx = audioCtxForPlayback;
      const i16 = new Int16Array(buffer);
      const audioBuffer = ctx.createBuffer(1, i16.length, 16000);
      const f32 = audioBuffer.getChannelData(0);
      for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
      const src = ctx.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(ctx.destination);
      src.start();
      addTurn('assistant', '[🔊 Audio response]');
      log(`Playing PCM16 ${(buffer.byteLength / 1024).toFixed(1)} KB`);
    } catch (e2) {
      log(`Audio playback failed: ${e2.message}`);
    }
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function addTurn(role, text) {
  if (!text || text === '…') return;
  const conv = document.getElementById('conversation');
  const existing = conv.lastChild;
  if (existing && existing.classList.contains(role) && role === 'user') {
    existing.textContent = text; return;
  }
  const el = document.createElement('div');
  el.className = `turn ${role}`;
  el.textContent = text;
  conv.appendChild(el);
  conv.scrollTop = conv.scrollHeight;
}

function updateMetrics() {
  document.getElementById('m-frames').textContent = stats.frames.toLocaleString();
  document.getElementById('m-audio').textContent = `${(stats.audioBytes / 1024).toFixed(1)} KB`;
  document.getElementById('m-transcripts').textContent = stats.transcripts;
  const rttEl = document.getElementById('m-rtt');
  if (rttMs === null) { rttEl.textContent = '—'; rttEl.className = 'metric-value'; }
  else {
    rttEl.textContent = `${rttMs} ms`;
    rttEl.className = `metric-value ${rttMs < 100 ? 'good' : rttMs < 200 ? 'warn' : 'bad'}`;
  }
}

function setStatus(cls, label) {
  document.getElementById('status-dot').className = `status-dot ${cls}`;
  document.getElementById('status-label').textContent = label;
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Ping / RTT ─────────────────────────────────────────────────────────────
function startPing() {
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      lastPingTs = Date.now();
      send({ type: 'ping' });
    }
  }, 3000);
}
</script>
</body>
</html>
